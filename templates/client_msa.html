<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">


<meta name="viewport"
      content="width=device-width, initial-scale=1.0">


<title>Client MSA</title>


<style>


    * {

        box-sizing: border-box;

        font-family: Arial, sans-serif;

    }


    body {

        margin: 0;

        background: #f4f7fb;

        min-height: 100vh;

    }


    /* =========================
       SIDEBAR
    ========================= */

    .sidebar {

        position: fixed;

        left: 0;

        top: 0;

        width: 230px;

        height: 100vh;

        background: #212529;

        padding: 25px 15px;

    }


    .sidebar h2 {

        color: white;

        text-align: center;

        margin-bottom: 30px;

    }


    .sidebar a {

        display: block;

        color: white;

        text-decoration: none;

        padding: 12px 15px;

        margin-bottom: 8px;

        border-radius: 5px;

    }


    .sidebar a:hover {

        background: #3498db;

    }


    /* =========================
       MAIN CONTENT
    ========================= */

    .main-content {

        margin-left: 230px;

        padding: 30px;

        min-height: 100vh;

    }


    /* =========================
       CONTAINER
    ========================= */

    .container {

        width: 100%;

        min-height: 100vh;

        background: white;

        padding: 40px;

        border-radius: 10px;

        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.15);

    }


    /* =========================
       HEADING
    ========================= */

    .container h2 {

        text-align: center;

        color: #2c3e50;

        margin-bottom: 35px;

    }


    /* =========================
       FORM GRID
    ========================= */

    .form-grid {

        display: grid;

        grid-template-columns: repeat(3, 1fr);

        gap: 25px;

    }


    .form-group {

        display: flex;

        flex-direction: column;

    }


    label {

        font-weight: bold;

        margin-bottom: 8px;

        color: #34495e;

    }


    input,

    select {

        width: 100%;

        height: 42px;

        padding: 10px;

        border: 1px solid #ccc;

        border-radius: 5px;

        font-size: 14px;

    }


    input:focus,

    select:focus {

        outline: none;

        border-color: #3498db;

    }


    /* =========================
       BUTTON
    ========================= */

    .button-section {

        text-align: center;

        margin-top: 35px;

    }


    button {

        width: 220px;

        height: 45px;

        background: #3498db;

        color: white;

        border: none;

        border-radius: 6px;

        font-size: 16px;

        cursor: pointer;

    }


    button:hover {

        background: #2980b9;

    }


    /* =========================
       RESPONSIVE
    ========================= */

    @media (max-width: 900px) {


        .sidebar {

            position: relative;

            width: 100%;

            height: auto;

        }


        .main-content {

            margin-left: 0;

            padding: 20px;

        }


        .form-grid {

            grid-template-columns: 1fr;

        }

    }


</style>
```

</head>

<body>

```
<!-- =========================
     SIDEBAR
========================= -->


<div class="sidebar">


    <h2>HRMS</h2>


    <a href="{{ url_for('dashboard_page') }}">

        🏠 Dashboard

    </a>


    <a href="{{ url_for('company_page') }}">

        🏢 Company

    </a>


    <a href="{{ url_for('resource_page') }}">

        👨‍💼 Resource

    </a>


    <a href="{{ url_for('client_msa_page') }}">

        📄 Client MSA

    </a>


    <a href="{{ url_for('client_work_order_page') }}">

        📋 Client Work Order

    </a>


    <a href="{{ url_for('supplier_msa_page') }}">

        📑 Supplier MSA

    </a>


    <a href="{{ url_for('supplier_po_page') }}">

        🧾 Supplier PO

    </a>


    <a href="{{ url_for('timesheet_page') }}">

        ⏱️ Timesheet

    </a>


</div>


<!-- =========================
     MAIN CONTENT
========================= -->


<div class="main-content">


    <div class="container">


        <h2>Client MSA Form</h2>


        <div class="form-grid">


            <!-- CLIENT NAME -->

            <div class="form-group">

                <label>Client Name</label>


                <input

                    id="client_name"

                    placeholder="Enter Client Name"

                >

            </div>


            <!-- MSA NUMBER -->

            <div class="form-group">

                <label>MSA Number</label>


                <input

                    id="msa_number"

                    placeholder="Enter MSA Number"

                >

            </div>


            <!-- START DATE -->

            <div class="form-group">

                <label>Start Date</label>


                <input

                    type="date"

                    id="start_date"

                >

            </div>


            <!-- END DATE -->

            <div class="form-group">

                <label>End Date</label>


                <input

                    type="date"

                    id="end_date"

                >

            </div>


            <!-- STATUS -->

            <div class="form-group">

                <label>Status</label>


                <select id="status">


                    <option value="Active">

                        Active

                    </option>


                    <option value="Inactive">

                        Inactive

                    </option>


                </select>

            </div>


        </div>


        <!-- SAVE BUTTON -->

        <div class="button-section">


            <button onclick="saveClientMSA()">

                Save Client MSA

            </button>


        </div>


    </div>


</div>


<!-- CLIENT MSA JAVASCRIPT -->

<script>


    function saveClientMSA() {


        let clientMSAData = {


            client_name:

                document.getElementById(

                    "client_name"

                ).value,


            msa_number:

                document.getElementById(

                    "msa_number"

                ).value,


            start_date:

                document.getElementById(

                    "start_date"

                ).value,


            end_date:

                document.getElementById(

                    "end_date"

                ).value,


            status:

                document.getElementById(

                    "status"

                ).value

        };


        fetch("/client_msa", {


            method: "POST",


            headers: {


                "Content-Type":

                    "application/json"

            },


            body:

                JSON.stringify(

                    clientMSAData

                )

        })


        .then(

            response =>

                response.json()

        )


        .then(

            data => {


                alert(

                    data.message

                );


            }

        )


        .catch(

            error => {


                console.error(

                    "Client MSA Error:",

                    error

                );


            }

        );


    }


</script>
```

</body>

</html>
