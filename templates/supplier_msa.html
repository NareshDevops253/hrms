<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">


<meta name="viewport"
      content="width=device-width, initial-scale=1.0">


<title>Supplier MSA</title>


<style>


    * {

        box-sizing: border-box;

        font-family: Arial, sans-serif;

    }


    body {

        margin: 0;

        background: #f5f5f5;

    }


    /* =========================
       SIDEBAR
    ========================= */

    .sidebar {

        position: fixed;

        left: 0;

        top: 0;

        width: 230px;

        height: 100vh;

        background: #212529;

        padding: 25px 15px;

        overflow-y: auto;

    }


    .sidebar h2 {

        color: white;

        text-align: center;

        margin-bottom: 30px;

    }


    .sidebar a {

        display: block;

        color: white;

        text-decoration: none;

        padding: 12px 15px;

        margin-bottom: 8px;

        border-radius: 5px;

    }


    .sidebar a:hover {

        background: #3498db;

    }


    /* =========================
       MAIN CONTENT
    ========================= */

    .main-content {

        margin-left: 230px;

        padding: 30px;

        min-height: 100vh;

    }


    /* =========================
       CONTAINER
    ========================= */

    .container {

        width: 100%;

        background: white;

        padding: 30px;

        border-radius: 10px;

        box-shadow: 0 0 10px #ccc;

        overflow-x: auto;

    }


    h2 {

        text-align: center;

        margin-bottom: 30px;

        color: #333;

    }


    /* =========================
       FORM GRID
    ========================= */

    .form-grid {

        display: grid;

        grid-template-columns: repeat(2, 1fr);

        gap: 20px;

    }


    .form-group {

        display: flex;

        flex-direction: column;

    }


    label {

        font-weight: bold;

        margin-bottom: 7px;

        color: #444;

    }


    input,

    select {

        width: 100%;

        height: 42px;

        padding: 10px;

        border: 1px solid #ccc;

        border-radius: 5px;

        font-size: 14px;

    }


    input:focus,

    select:focus {

        outline: none;

        border-color: #007bff;

        box-shadow: 0 0 4px rgba(0, 123, 255, 0.25);

    }


    /* =========================
       BUTTONS
    ========================= */

    .button-section {

        margin-top: 25px;

        text-align: center;

    }


    button {

        padding: 10px 25px;

        border: none;

        border-radius: 5px;

        cursor: pointer;

        margin-right: 10px;

        font-weight: bold;

    }


    #saveBtn {

        background: green;

        color: white;

    }


    #saveBtn:hover {

        background: #218838;

    }


    #updateBtn {

        background: orange;

        color: white;

        display: none;

    }


    #updateBtn:hover {

        background: #e0a800;

    }


    /* =========================
       TABLE
    ========================= */

    .table-container {

        width: 100%;

        overflow-x: auto;

    }


    table {

        width: 100%;

        border-collapse: collapse;

        margin-top: 30px;

        min-width: 700px;

    }


    table,

    th,

    td {

        border: 1px solid #ddd;

    }


    th {

        background: #007bff;

        color: white;

        padding: 12px;

    }


    td {

        padding: 10px;

        text-align: center;

    }


    tr:nth-child(even) {

        background: #f8f9fa;

    }


    tr:hover {

        background: #e9ecef;

    }


    /* =========================
       RESPONSIVE
    ========================= */

    @media (max-width: 900px) {


        .sidebar {

            position: relative;

            width: 100%;

            height: auto;

        }


        .main-content {

            margin-left: 0;

            padding: 20px;

        }


        .container {

            width: 100%;

        }


        .form-grid {

            grid-template-columns: 1fr;

        }

    }


</style>
```

</head>

<body>

```
<!-- =========================
     SIDEBAR
========================= -->


<div class="sidebar">


    <h2>

        HRMS

    </h2>


    <a href="{{ url_for('dashboard_page') }}">

        🏠 Dashboard

    </a>


    <a href="{{ url_for('company_page') }}">

        🏢 Company

    </a>


    <a href="{{ url_for('resource_page') }}">

        👨‍💼 Resource

    </a>


    <a href="{{ url_for('client_msa_page') }}">

        📄 Client MSA

    </a>


    <a href="{{ url_for('client_work_order_page') }}">

        📋 Client Work Order

    </a>


    <a href="{{ url_for('supplier_msa_page') }}">

        📑 Supplier MSA

    </a>


    <a href="{{ url_for('supplier_po_page') }}">

        🧾 Supplier PO

    </a>


    <a href="{{ url_for('timesheet_page') }}">

        ⏱️ Timesheet

    </a>


</div>


<!-- =========================
     MAIN CONTENT
========================= -->


<div class="main-content">


    <div class="container">


        <h2>

            Supplier MSA

        </h2>


        <!-- =========================
             FORM
        ========================= -->


        <div class="form-grid">


            <!-- HIDDEN ID -->

            <input

                type="hidden"

                id="supplier_msa_id"

            >


            <!-- SUPPLIER NAME -->

            <div class="form-group">


                <label>

                    Supplier Name

                </label>


                <input

                    type="text"

                    id="supplier_name"

                    placeholder="Enter Supplier Name"

                >


            </div>


            <!-- MSA NUMBER -->

            <div class="form-group">


                <label>

                    MSA Number

                </label>


                <input

                    type="text"

                    id="msa_number"

                    placeholder="Enter MSA Number"

                >


            </div>


            <!-- START DATE -->

            <div class="form-group">


                <label>

                    Start Date

                </label>


                <input

                    type="date"

                    id="start_date"

                >


            </div>


            <!-- END DATE -->

            <div class="form-group">


                <label>

                    End Date

                </label>


                <input

                    type="date"

                    id="end_date"

                >


            </div>


            <!-- STATUS -->

            <div class="form-group">


                <label>

                    Status

                </label>


                <select id="status">


                    <option value="">

                        Select Status

                    </option>


                    <option value="Active">

                        Active

                    </option>


                    <option value="Inactive">

                        Inactive

                    </option>


                </select>


            </div>


        </div>


        <!-- =========================
             BUTTONS
        ========================= -->


        <div class="button-section">


            <button

                id="saveBtn"

                onclick="saveSupplierMSA()"

            >

                Save

            </button>


            <button

                id="updateBtn"

                onclick="updateSupplierMSA()"

            >

                Update

            </button>


        </div>


        <!-- =========================
             TABLE
        ========================= -->


        <div class="table-container">


            <table>


                <thead>


                    <tr>


                        <th>

                            ID

                        </th>


                        <th>

                            Supplier Name

                        </th>


                        <th>

                            MSA Number

                        </th>


                        <th>

                            Start Date

                        </th>


                        <th>

                            End Date

                        </th>


                        <th>

                            Status

                        </th>


                        <th>

                            Actions

                        </th>


                    </tr>


                </thead>


                <tbody

                    id="supplierMSATable"

                >


                </tbody>


            </table>


        </div>


    </div>


</div>


<!-- =========================
     SUPPLIER MSA JAVASCRIPT
========================= -->


<script

    src="{{ url_for('static', filename='js/supplier_msa.js') }}"

></script>
```

</body>

</html>
