<!DOCTYPE html>
<html>
<head>
<title>Company</title>
</head>

<body>

<h2>Company Form</h2>


<input id="company_name" placeholder="Company Name"><br><br>

<input id="email" placeholder="Email"><br><br>

<input id="phone" placeholder="Phone"><br><br>

<textarea id="address" placeholder="Address"></textarea><br><br>


<select id="status">
<option value="Active">Active</option>
<option value="Inactive">Inactive</option>
</select>


<br><br>

<button onclick="saveCompany()">Save Company</button>



<script>


function saveCompany(){

    let companyData = {

        company_name:
        document.getElementById("company_name").value,

        email:
        document.getElementById("email").value,

        phone:
        document.getElementById("phone").value,

        address:
        document.getElementById("address").value,

        status:
        document.getElementById("status").value
    }



    fetch("/company",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(companyData)

    })

    .then(response=>response.json())

    .then(data=>{

        alert(data.message);

    })

}


</script>script src="{{ url_for('static', filename='js/client_msa.js') }}"></script>

</body>
</html>
