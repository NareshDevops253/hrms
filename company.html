<!DOCTYPE html>
<html>

<head>

<title>Company</title>


<style>

*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    margin:0;
    padding:20px;
    background:#f4f7fb;
    min-height:100vh;

}



.container{

    width:100%;
    min-height:100vh;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.15);

}



h2{

    text-align:center;
    color:#2c3e50;
    margin-bottom:35px;

}



.form-grid{

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;

}



.form-group{

    display:flex;
    flex-direction:column;

}



label{

    font-weight:bold;
    margin-bottom:8px;
    color:#34495e;

}



input, textarea, select{


    width:100%;
    height:42px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;


}



textarea{

    height:100px;
    resize:none;

}



input:focus,
textarea:focus,
select:focus{

    outline:none;
    border-color:#3498db;

}



.button-section{

    text-align:center;
    margin-top:30px;

}



button{


    width:220px;
    height:45px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;


}



button:hover{

    background:#2980b9;

}



@media(max-width:900px){

.form-grid{

    grid-template-columns:1fr;

}

}


</style>


</head>



<body>



<div class="container">



<h2>Company Form</h2>



<div class="form-grid">



<div class="form-group">

<label>Company Name</label>

<input id="company_name" placeholder="Enter Company Name">

</div>



<div class="form-group">

<label>Email</label>

<input id="email" placeholder="Enter Email">

</div>



<div class="form-group">

<label>Phone</label>

<input id="phone" placeholder="Enter Phone Number">

</div>



<div class="form-group">

<label>Status</label>

<select id="status">

<option value="Active">Active</option>

<option value="Inactive">Inactive</option>

</select>

</div>



<div class="form-group" style="grid-column:span 2;">

<label>Address</label>

<textarea id="address" placeholder="Enter Address"></textarea>

</div>



</div>



<div class="button-section">

<button onclick="saveCompany()">

Save Company

</button>

</div>



</div>





<script>


function saveCompany(){


    let companyData = {


        company_name:
        document.getElementById("company_name").value,


        email:
        document.getElementById("email").value,


        phone:
        document.getElementById("phone").value,


        address:
        document.getElementById("address").value,


        status:
        document.getElementById("status").value

    }



    fetch("/company",{


        method:"POST",


        headers:{


            "Content-Type":"application/json"


        },


        body:JSON.stringify(companyData)


    })


    .then(response=>response.json())


    .then(data=>{


        alert(data.message);


    })



}


</script>



<script src="{{ url_for('static', filename='js/company.js') }}"></script>



</body>

</html>
