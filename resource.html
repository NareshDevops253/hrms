<!DOCTYPE html>
<html>

<head>

<title>Resource</title>


<style>

*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    margin:0;
    padding:20px;
    background:#f4f7fb;
    min-height:100vh;

}



.container{

    width:100%;
    min-height:100vh;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.15);

}



h2{

    text-align:center;
    color:#2c3e50;
    margin-bottom:35px;

}



.form-grid{

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;

}



.form-group{

    display:flex;
    flex-direction:column;

}



label{

    font-weight:bold;
    margin-bottom:8px;
    color:#34495e;

}



input,
select{

    width:100%;
    height:42px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;

}



input:focus,
select:focus{

    outline:none;
    border-color:#3498db;

}



.button-section{

    text-align:center;
    margin-top:35px;

}



button{

    width:220px;
    height:45px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;

}



button:hover{

    background:#2980b9;

}



@media(max-width:900px){

.form-grid{

    grid-template-columns:1fr;

}

}


</style>


</head>



<body>



<div class="container">


<h2>Resource Form</h2>



<div class="form-grid">



<div class="form-group">

<label>Employee ID</label>

<input type="text" id="employee_id" placeholder="Enter Employee ID">

</div>



<div class="form-group">

<label>First Name</label>

<input type="text" id="first_name" placeholder="Enter First Name">

</div>



<div class="form-group">

<label>Last Name</label>

<input type="text" id="last_name" placeholder="Enter Last Name">

</div>



<div class="form-group">

<label>Email</label>

<input type="email" id="email" placeholder="Enter Email">

</div>



<div class="form-group">

<label>Phone</label>

<input type="text" id="phone" placeholder="Enter Phone Number">

</div>



<div class="form-group">

<label>Designation</label>

<input type="text" id="designation" placeholder="Enter Designation">

</div>



<div class="form-group">

<label>Company Name</label>

<input type="text" id="company_name" placeholder="Enter Company Name">

</div>



<div class="form-group">

<label>Resource Type</label>


<select id="resource_type">

<option value="">Select Resource Type</option>

<option value="W2">W2</option>

<option value="C2C">C2C</option>

<option value="1099">1099</option>


</select>


</div>



<div class="form-group">

<label>Select Company</label>


<select id="company_id">


<option value="">Select Company</option>


</select>


</div>



<div class="form-group">

<label>Status</label>


<select id="status">


<option value="Active">Active</option>

<option value="Inactive">Inactive</option>


</select>


</div>



</div>



<div class="button-section">


<button onclick="saveResource()">

Save Resource

</button>


</div>



</div>



<script src="/static/js/resource.js?v=2"></script>


</body>


</html>
