<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Resource Management</title>

</head>


<body>


    <h2>Resource Management</h2>


    <!-- RESOURCE ID -->

    <input

        type="hidden"

        id="resource_id"

    >


    <!-- EMPLOYEE ID -->

    <label>Employee ID</label>

    <input

        type="text"

        id="employee_id"

    >

    <br><br>


    <!-- FIRST NAME -->

    <label>First Name</label>

    <input

        type="text"

        id="first_name"

    >

    <br><br>


    <!-- LAST NAME -->

    <label>Last Name</label>

    <input

        type="text"

        id="last_name"

    >

    <br><br>


    <!-- EMAIL -->

    <label>Email</label>

    <input

        type="email"

        id="email"

    >

    <br><br>


    <!-- PHONE -->

    <label>Phone</label>

    <input

        type="text"

        id="phone"

        maxlength="10"

    >

    <br><br>


    <!-- DESIGNATION -->

    <label>Designation</label>

    <input

        type="text"

        id="designation"

    >

    <br><br>


    <!-- COMPANY NAME -->

    <label>Company Name</label>

    <input

        type="text"

        id="company_name"

    >

    <br><br>


    <!-- COMPANY DROPDOWN -->

    <label>Company</label>

    <select id="company_id">

        <option value="">

            Select Company

        </option>

    </select>

    <br><br>


    <!-- RESOURCE TYPE -->

    <label>Resource Type</label>

    <select id="resource_type">

        <option value="">

            Select Resource Type

        </option>


        <option value="W2">

            W2

        </option>


        <option value="C2C">

            C2C

        </option>


        <option value="1099">

            1099

        </option>

    </select>

    <br><br>


    <!-- STATUS -->

    <label>Status</label>

    <select id="status">

        <option value="">

            Select Status

        </option>


        <option value="Active">

            Active

        </option>


        <option value="Inactive">

            Inactive

        </option>

    </select>

    <br><br>


    <!-- START DATE -->

    <label>Start Date</label>

    <input

        type="date"

        id="start_date"

    >

    <br><br>


    <!-- BUTTONS -->

    <button

        onclick="saveResource()"

    >

        Save Resource

    </button>


    <button

        onclick="updateResource()"

    >

        Update Resource

    </button>


    <script

        src="{{ url_for(

            'static',

            filename='js/resource.js'

        ) }}"

    >

    </script>


</body>

</html>
