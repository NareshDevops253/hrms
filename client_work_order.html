<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Client Work Order</title>


    <style>

        body {

            font-family: Arial, sans-serif;

            background: #f4f6f8;

            padding: 20px;

        }


        .container {

            width: 95%;

            margin: auto;

            background: white;

            padding: 25px;

            border-radius: 10px;

            box-shadow: 0 0 10px #ccc;

        }


        h2 {

            text-align: center;

            color: #333;

        }


        .form-row {

            display: flex;

            gap: 20px;

            margin-bottom: 15px;

        }


        .form-group {

            flex: 1;

        }


        label {

            display: block;

            margin-bottom: 5px;

            font-weight: bold;

        }


        input,
        select {

            width: 100%;

            padding: 10px;

            border: 1px solid #ccc;

            border-radius: 5px;

            box-sizing: border-box;

        }


        input[readonly] {

            background: #eeeeee;

        }


        button {

            padding: 10px 20px;

            margin: 10px 5px 20px 0;

            border: none;

            border-radius: 5px;

            cursor: pointer;

            font-weight: bold;

        }


        #saveBtn {

            background: green;

            color: white;

        }


        #updateBtn {

            background: blue;

            color: white;

            display: none;

        }


        #clearBtn {

            background: gray;

            color: white;

        }


        table {

            width: 100%;

            border-collapse: collapse;

            margin-top: 20px;

        }


        th,
        td {

            border: 1px solid #ddd;

            padding: 10px;

            text-align: center;

        }


        th {

            background: #343a40;

            color: white;

        }


        .edit-btn {

            background: orange;

            color: black;

            padding: 6px 12px;

        }


        .delete-btn {

            background: red;

            color: white;

            padding: 6px 12px;

        }

    </style>

</head>


<body>


<div class="container">


    <h2>Client Work Order</h2>


    <!-- ========================= -->
    <!-- CLIENT MSA -->
    <!-- ========================= -->


    <div class="form-row">


        <div class="form-group">


            <label>Client MSA</label>


            <select id="client_msa_id">


                <option value="">

                    Select Client MSA

                </option>


            </select>


        </div>


        <div class="form-group">


            <label>Work Order Number</label>


            <input

                type="text"

                id="work_order_number"

                placeholder="Enter Work Order Number"

            >


        </div>


    </div>


    <!-- ========================= -->
    <!-- RESOURCE -->
    <!-- ========================= -->


    <div class="form-row">


        <div class="form-group">


            <label>Resource Name</label>


            <select id="resource_name">


                <option value="">

                    Select Resource

                </option>


            </select>


        </div>


        <div class="form-group">


            <label>Company Name</label>


            <input

                type="text"

                id="company_name"

                readonly

            >


        </div>


    </div>


    <!-- ========================= -->
    <!-- RESOURCE TYPE -->
    <!-- ========================= -->


    <div class="form-row">


        <div class="form-group">


            <label>Resource Type</label>


            <input

                type="text"

                id="resource_type"

                readonly

            >


        </div>


        <div class="form-group">


            <label>Work Order Start Date</label>


            <input

                type="date"

                id="start_date"

            >


        </div>


    </div>


    <!-- ========================= -->
    <!-- PROJECT AND STATUS -->
    <!-- ========================= -->


    <div class="form-row">


        <div class="form-group">


            <label>Project Name</label>


            <input

                type="text"

                id="project_name"

                placeholder="Enter Project Name"

            >


        </div>


        <div class="form-group">


            <label>Status</label>


            <select id="status">


                <option value="Active">

                    Active

                </option>


                <option value="Inactive">

                    Inactive

                </option>


                <option value="Completed">

                    Completed

                </option>


            </select>


        </div>


    </div>


    <!-- ========================= -->
    <!-- WORK ORDER END DATE -->
    <!-- ========================= -->


    <div class="form-row">


        <div class="form-group">


            <label>Work Order End Date</label>


            <input

                type="date"

                id="end_date"

            >


        </div>


        <div class="form-group">


        </div>


    </div>


    <!-- ========================= -->
    <!-- BUTTONS -->
    <!-- ========================= -->


    <button

        id="saveBtn"

        onclick="saveClientWorkOrder()"

    >

        Save

    </button>


    <button

        id="updateBtn"

        onclick="updateClientWorkOrder()"

    >

        Update

    </button>


    <button

        id="clearBtn"

        onclick="clearForm()"

    >

        Clear

    </button>


    <!-- ========================= -->
    <!-- TABLE -->
    <!-- ========================= -->


    <h3>

        Client Work Order List

    </h3>


    <table>


        <thead>


            <tr>


                <th>ID</th>

                <th>MSA Number</th>

                <th>Work Order Number</th>

                <th>Company</th>

                <th>Resource</th>

                <th>Resource Type</th>

                <th>Project</th>

                <th>Start Date</th>

                <th>End Date</th>

                <th>Status</th>

                <th>Actions</th>


            </tr>


        </thead>


        <tbody id="workOrderTableBody">


        </tbody>


    </table>


</div>


<script

    src="{{ url_for('static', filename='js/client_work_order.js') }}"

></script>


</body>

</html>
