<!DOCTYPE html>
<html>
<head>
    <title>Client Work Order</title>

    <style>

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: #f4f7fb;
            min-height: 100vh;
        }


        .container {

            width: 100%;
            min-height: 100vh;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.15);

        }


        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }


        .form-grid {

            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;

        }


        .form-group {

            display: flex;
            flex-direction: column;

        }


        label {

            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;

        }


        input, select {

            width: 100%;
            height: 40px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;

        }


        input:focus, select:focus {

            border-color: #3498db;
            outline: none;

        }


        .button-section {

            margin-top: 25px;
            text-align: center;

        }


        button {

            width: 200px;
            height: 45px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;

        }


        button:hover {

            background: #2980b9;

        }


        hr {

            margin: 35px 0;

        }


        h3 {

            color: #2c3e50;

        }


        .table-container {

            overflow-x: auto;

        }


        table {

            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;

        }


        th {

            background: #3498db;
            color: white;
            padding: 12px;
            text-align: center;

        }


        td {

            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;

        }


        tr:hover {

            background: #f1f8ff;

        }


        @media(max-width:900px){

            .form-grid{

                grid-template-columns: 1fr;

            }

        }


    </style>

</head>


<body>


<div class="container">


<h2>Client Work Order</h2>


<div class="form-grid">


<div class="form-group">

<label>Client MSA</label>

<select id="client_msa_id">

<option value="">Select Client MSA</option>

</select>

</div>



<div class="form-group">

<label>Work Order Number</label>

<input type="text" id="work_order_number">

</div>



<div class="form-group">

<label>Project Name</label>

<input type="text" id="project_name">

</div>



<div class="form-group">

<label>Company Name</label>

<select id="company_name">

<option value="">Select Company</option>

</select>

</div>



<div class="form-group">

<label>Resource Name</label>

<select id="resource_name">

<option value="">Select Resource</option>

</select>

</div>



<div class="form-group">

<label>Resource Type</label>

<select id="resource_type">

<option value="">Select Resource Type</option>
<option value="C2C">C2C</option>
<option value="W2">W2</option>
<option value="1099">1099</option>

</select>

</div>



<div class="form-group">

<label>Start Date</label>

<input type="date" id="start_date">

</div>



<div class="form-group">

<label>End Date</label>

<input type="date" id="end_date">

</div>



<div class="form-group">

<label>Status</label>

<select id="status">

<option value="Active">Active</option>
<option value="Inactive">Inactive</option>

</select>

</div>


</div>



<div class="button-section">

<button onclick="saveClientWorkOrder()">
Save
</button>

</div>



<hr>



<h3>Client Work Orders</h3>


<div class="table-container">


<table border="1">

<thead>

<tr>

<th>ID</th>
<th>Client MSA</th>
<th>Work Order No</th>
<th>Project Name</th>
<th>Company Name</th>
<th>Resource Name</th>
<th>Resource Type</th>
<th>Start Date</th>
<th>End Date</th>
<th>Status</th>

</tr>

</thead>


<tbody id="clientWorkOrderTable">


</tbody>


</table>


</div>


</div>


<script src="/static/js/client_work_order.js"></script>


</body>

</html>
