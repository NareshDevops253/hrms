<!DOCTYPE html>
<html>
<head>
    <title>Client MSA</title>
</head>

<body>

<h2>Client MSA Form</h2>

<input id="client_name" placeholder="Client Name"><br><br>

<input id="msa_number" placeholder="MSA Number"><br><br>

<label>Start Date</label><br>
<input type="date" id="start_date"><br><br>

<label>End Date</label><br>
<input type="date" id="end_date"><br><br>

<select id="status">
    <option value="Active">Active</option>
    <option value="Inactive">Inactive</option>
</select>

<br><br>

<button onclick="saveClientMSA()">Save Client MSA</button>

<script>

function saveClientMSA(){

    let clientMSAData = {

        client_name:
        document.getElementById("client_name").value,

        msa_number:
        document.getElementById("msa_number").value,

        start_date:
        document.getElementById("start_date").value,

        end_date:
        document.getElementById("end_date").value,

        status:
        document.getElementById("status").value
    };

    fetch("/client_msa", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify(clientMSAData)

    })

    .then(response => response.json())

    .then(data => {

        alert(data.message);

    });

}

</script>

</body>
</html>
