<!DOCTYPE html>
<html>

<head>

<title>Client MSA</title>


<style>

*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    margin:0;
    padding:20px;
    background:#f4f7fb;
    min-height:100vh;

}



.container{

    width:100%;
    min-height:100vh;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.15);

}



h2{

    text-align:center;
    color:#2c3e50;
    margin-bottom:35px;

}



.form-grid{

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;

}



.form-group{

    display:flex;
    flex-direction:column;

}



label{

    font-weight:bold;
    margin-bottom:8px;
    color:#34495e;

}



input,
select{

    width:100%;
    height:42px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;

}



input:focus,
select:focus{

    outline:none;
    border-color:#3498db;

}



.button-section{

    text-align:center;
    margin-top:35px;

}



button{

    width:220px;
    height:45px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;

}



button:hover{

    background:#2980b9;

}



@media(max-width:900px){

.form-grid{

    grid-template-columns:1fr;

}

}


</style>


</head>



<body>



<div class="container">



<h2>Client MSA Form</h2>



<div class="form-grid">



<div class="form-group">

<label>Client Name</label>

<input id="client_name" placeholder="Enter Client Name">

</div>



<div class="form-group">

<label>MSA Number</label>

<input id="msa_number" placeholder="Enter MSA Number">

</div>



<div class="form-group">

<label>Start Date</label>

<input type="date" id="start_date">

</div>



<div class="form-group">

<label>End Date</label>

<input type="date" id="end_date">

</div>



<div class="form-group">

<label>Status</label>


<select id="status">

<option value="Active">Active</option>

<option value="Inactive">Inactive</option>


</select>


</div>



</div>



<div class="button-section">


<button onclick="saveClientMSA()">

Save Client MSA

</button>


</div>



</div>





<script>


function saveClientMSA(){


    let clientMSAData = {


        client_name:
        document.getElementById("client_name").value,


        msa_number:
        document.getElementById("msa_number").value,


        start_date:
        document.getElementById("start_date").value,


        end_date:
        document.getElementById("end_date").value,


        status:
        document.getElementById("status").value


    };



    fetch("/client_msa", {


        method:"POST",


        headers:{


            "Content-Type":"application/json"


        },


        body:JSON.stringify(clientMSAData)


    })



    .then(response=>response.json())


    .then(data=>{


        alert(data.message);


    });



}


</script>



</body>

</html>
