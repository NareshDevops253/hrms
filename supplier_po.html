<!DOCTYPE html>

<html>

<head>

<title>Supplier PO</title>


<style>


body{

    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:30px;

}



h2{

    text-align:center;
    color:#333;

}



.container{

    width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px #ccc;

}



input, select{

    width:100%;
    height:40px;
    padding:8px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;

}



label{

    font-weight:bold;
    color:#555;

}



button{

    width:150px;
    height:40px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;

}



button:hover{

    background:#0056b3;

}



table{

    width:100%;
    margin-top:30px;
    border-collapse:collapse;
    background:white;

}



th{

    background:#007bff;
    color:white;
    padding:12px;

}



td{

    padding:10px;
    text-align:center;
    border:1px solid #ddd;

}



tr:nth-child(even){

    background:#f2f2f2;

}


</style>


</head>



<body>



<div class="container">


<h2>Supplier PO</h2>



<select id="supplier_msa_id">

<option value="">
Select Supplier MSA
</option>

</select>


<br><br>



<input id="po_number"
placeholder="PO Number">



<br><br>



<input id="project_name"
placeholder="Project Name">



<br><br>



<label>Start Date</label>

<input type="date"
id="start_date">



<br><br>



<label>End Date</label>

<input type="date"
id="end_date">



<br><br>



<input id="amount"
placeholder="Amount">



<br><br>



<select id="status">


<option value="Active">
Active
</option>


<option value="Inactive">
Inactive
</option>


</select>



<br><br>



<button onclick="saveSupplierPO()">

Save

</button>




<table>


<thead>

<tr>

<th>ID</th>

<th>Supplier MSA</th>

<th>PO Number</th>

<th>Project</th>

<th>Amount</th>

<th>Status</th>

<th>Action</th>


</tr>


</thead>



<tbody id="supplier_po_table">


</tbody>


</table>



</div>



<script src="/static/js/supplier_po.js"></script>



</body>

</html>
