<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier MSA</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:30px;
            background:#f5f5f5;
        }

        .container{
            width:90%;
            margin:auto;
            background:#fff;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-right:10px;
        }

        #saveBtn{
            background:green;
            color:white;
        }

        #updateBtn{
            background:orange;
            color:white;
            display:none;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        table, th, td{
            border:1px solid #ddd;
        }

        th{
            background:#007bff;
            color:white;
            padding:10px;
        }

        td{
            padding:10px;
            text-align:center;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>Supplier MSA</h2>

    <input type="hidden" id="supplier_msa_id">

    <label>Supplier Name</label>
    <input type="text" id="supplier_name" placeholder="Enter Supplier Name">

    <label>MSA Number</label>
    <input type="text" id="msa_number" placeholder="Enter MSA Number">

    <label>Start Date</label>
    <input type="date" id="start_date">

    <label>End Date</label>
    <input type="date" id="end_date">

    <label>Status</label>
    <select id="status">
        <option value="">Select Status</option>
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
    </select>

    <button id="saveBtn" onclick="saveSupplierMSA()">Save</button>

    <button id="updateBtn" onclick="updateSupplierMSA()">Update</button>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Supplier Name</th>
                <th>MSA Number</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="supplierMSATable">

        </tbody>

    </table>

</div>

<script src="/static/js/supplier_msa.js"></script>

</body>
</html>
