<!DOCTYPE html>
<html>
<head>
    <title>HRMS Login</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f5f9;
            font-family: Arial, sans-serif;
        }

        .login-container {
            width: 350px;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        label {
            font-size: 14px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        #message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: red;
        }

    </style>

</head>

<body>

<div class="login-container">

    <h2>HRMS Login</h2>

    <label>Username</label><br>
    <input type="text" id="username" placeholder="Enter Username">


    <label>Password</label><br>
    <input type="password" id="password" placeholder="Enter Password">


    <button onclick="login()">Login</button>

    <p id="message"></p>

</div>


<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
